<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | VELORA</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='front/style.css') }}">
</head>
<body>
    {% include 'front/share/navbar.html' %}
    <main>
        <section
            class="d-flex justify-content-center align-items-center"
            style="min-height:80vh;">
            <div
                class="bg-white shadow rounded-4 p-5"
                style="width:100%; max-width:500px;"
            >
                <span
                    style="
                        color:#c79a3b;
                        font-size:14px;
                        letter-spacing:3px;
                        font-weight:600;
                    ">
                    JOIN VELORA
                </span>
                <h2 class="mt-3 mb-2 fw-bold">
                    Create Account
                </h2>
                <p class="text-muted mb-4">
                    Become part of our premium fashion house.
                </p>
<form action="/register" method="POST">

    <div class="row">

        <div class="col-md-6 mb-3">
            <input
                type="text"
                name="first_name"
                class="form-control"
                placeholder="First Name"
                required
            >
        </div>

        <div class="col-md-6 mb-3">
            <input
                type="text"
                name="last_name"
                class="form-control"
                placeholder="Last Name"
                required
            >
        </div>

    </div>

    <input
        type="email"
        name="email"
        class="form-control mb-3"
        placeholder="Email Address"
        required
    >

    <input
        type="password"
        name="password"
        class="form-control mb-3"
        placeholder="Password"
        required
    >

    <input
        type="password"
        name="confirm_password"
        class="form-control mb-4"
        placeholder="Confirm Password"
        required
    >

    <button
        type="submit"
        class="btn register-btn w-100"
    >
        Create Account
    </button>

    <div class="text-center mt-4">
        Already have an account?
        <a href="/login">
            Login
        </a>
    </div>

</form>
            </div>
        </section>
    </main>
    {% include 'front/share/footer.html' %}
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
</body>
</html>
