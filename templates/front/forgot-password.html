<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | VELORA</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='front/style.css') }}">
</head>
<body>
    {% include 'front/share/navbar.html' %}
    <main>
        <section
            class="d-flex justify-content-center align-items-center"
            style="min-height:80vh;">
            <div
                class="bg-white shadow rounded-4 p-5"
                style="width:100%; max-width:500px;">
                <span
                    style="
                        color:#c79a3b;
                        font-size:14px;
                        letter-spacing:3px;
                        font-weight:600;
                    ">
                    RECOVER ACCOUNT
                </span>
                <h2 class="mt-3 mb-2 fw-bold">
                    Forgot Password
                </h2>
                <p class="text-muted mb-4">
                    Enter your email address and we'll help you reset your password.
                </p>
<form action="/forgot-password" method="POST">

    <input
        type="email"
        name="email"
        class="form-control mb-4"
        placeholder="Email Address"
        required
    >

    <button
        type="submit"
        class="btn register-btn w-100"
    >
        Reset Password
    </button>

</form>
            </div>
        </section>
    </main>
    {% include 'front/share/footer.html' %}
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
</body>
</html>
