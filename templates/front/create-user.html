<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User | VELORA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='front/style.css') }}">
</head>
<body>

    {% include 'front/share/navbar.html' %}

    <main>

        <section class="auth-section">
            <div class="auth-box">

                <span class="mini-title">
                    ADMIN
                </span>

                <h2>
                    Create User
                </h2>

                <input
                    type="text"
                    placeholder="Name"
                >

                <input
                    type="email"
                    placeholder="Email"
                >

                <input
                    type="password"
                    placeholder="Password"
                >

                <button class="btn-gold full-btn">
                    Create User
                </button>

            </div>
        </section>

    </main>

    {% include 'front/share/footer.html' %}

</body>
</html>
