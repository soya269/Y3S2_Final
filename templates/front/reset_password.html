<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | VELORA</title>
<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
>

<link
    rel="stylesheet"
    href="{{ url_for('static', filename='front/style.css') }}"
>

</head>
<body>

{% include 'front/share/navbar.html' %}

<main>

    <section
        class="d-flex justify-content-center align-items-center"
        style="min-height:80vh;"
    >

        <div
            class="bg-white shadow rounded-4 p-5"
            style="width:100%; max-width:530px;"
        >

            <span
                style="
                    color:#c79a3b;
                    font-size:14px;
                    letter-spacing:3px;
                    font-weight:600;
                "
            >
                RESET PASSWORD
            </span>

            <h2 class="mt-3 mb-2 fw-bold">
                Create New Password
            </h2>

            <p class="text-muted mb-4">
                Enter your new password below.
            </p>

            <form action="/reset-password" method="POST">

                <input
                    type="hidden"
                    name="email"
                    value="{{ email }}"
                >

                <input
                    type="password"
                    name="password"
                    class="form-control mb-3"
                    placeholder="New Password"
                    style="
                        height:55px;
                        border-radius:14px;
                    "
                    required
                >

                <input
                    type="password"
                    name="confirm_password"
                    class="form-control mb-4"
                    placeholder="Confirm Password"
                    style="
                        height:55px;
                        border-radius:14px;
                    "
                    required
                >

                <button
                    type="submit"
                    class="btn w-100 fw-bold"
                    style="
                        background:#c79a3b;
                        color:white;
                        height:55px;
                        border-radius:30px;
                    "
                >
                    Update Password
                </button>

                <div class="text-center mt-4">
                    <a
                        href="/login"
                        class="text-decoration-none"
                    >
                        Back To Login
                    </a>
                </div>
{% if error %}
<div class="error-message">
    {{ error }}
</div>
{% endif %}
            </form>

        </div>

    </section>

</main>

{% include 'front/share/footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
